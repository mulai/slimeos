name: slimeos-brain

# Slime OS — Cloud Brain Stack
#
# Services:
#   caddy       — TLS termination + reverse proxy
#   authelia    — MFA / zero-trust identity gateway
#   wireguard   — VPN gateway (UDP 51820); RDP never exposed directly
#   desktop     — Ubuntu xRDP Linux cloud desktop VM (free path / BYOL fallback)
#   redis       — Authelia session store
#   postgres    — Authelia + Slime API persistent store
#
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
#
# Security notes:
#   - RDP port 3389 is NOT published to the host. It's only reachable via WireGuard.
#   - Authelia sits in front of all HTTP services.
#   - All inter-service traffic is on the internal 'slimenet' bridge.

services:

  # ── Caddy — TLS + reverse proxy ─────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: slimeos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - slimenet
    depends_on:
      - authelia

  # ── Authelia — MFA / identity gateway ────────────────────────────────────────
  authelia:
    image: authelia/authelia:latest
    container_name: slimeos-authelia
    restart: unless-stopped
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml
      - authelia_config:/config
    environment:
      AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: "${AUTHELIA_JWT_SECRET}"
      AUTHELIA_SESSION_SECRET: "${AUTHELIA_SESSION_SECRET}"
      AUTHELIA_STORAGE_ENCRYPTION_KEY: "${AUTHELIA_STORAGE_ENCRYPTION_KEY}"
      AUTHELIA_SESSION_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      AUTHELIA_NOTIFIER_SMTP_USERNAME: "${SMTP_USER}"
      AUTHELIA_NOTIFIER_SMTP_PASSWORD: "${SMTP_PASSWORD}"
      AUTHELIA_STORAGE_POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    networks:
      - slimenet
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis — Authelia session store ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: slimeos-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - slimenet
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL — persistent store ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: slimeos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: authelia
      POSTGRES_USER: authelia
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - slimenet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authelia"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── WireGuard — VPN gateway ────────────────────────────────────────────────────
  # Membrane clients connect here; once inside, they can reach the desktop service.
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: slimeos-wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "UTC"
      SERVERURL: "${WG_SERVER_URL}"          # e.g. vpn.slimeos.com
      SERVERPORT: "${WG_PORT:-51820}"
      PEERS: "${WG_PEERS:-1}"                # number of client configs to generate
      PEERDNS: "auto"
      INTERNAL_SUBNET: "10.10.0.0"
      ALLOWEDIPS: "10.10.0.0/24,10.11.0.0/24"
      LOG_CONFS: "false"
    volumes:
      - wireguard_config:/config
      - /lib/modules:/lib/modules:ro
      - ./wireguard/provision-peer.sh:/config/provision-peer.sh:ro
    ports:
      - "${WG_PORT:-51820}:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      slimenet: {}
      vpnnet:
        ipv4_address: 10.11.0.2    # fixed — WireGuard bridges peer subnet to vpnnet

  # ── Linux Cloud Desktop (free path / BYOL fallback) ────────────────────────────
  # Ubuntu 22.04 + xRDP + XFCE. Reachable only via WireGuard (10.10.0.0/24).
  # Windows path: BYO licensed Windows VM on the same WireGuard network (not Docker).
  desktop:
    build:
      context: ./xrdp
      dockerfile: Dockerfile
    image: slimeos/desktop:latest
    container_name: slimeos-desktop
    restart: unless-stopped
    environment:
      SLIME_USER: "${SLIME_DESKTOP_USER:-slimeuser}"
      SLIME_PASS: "${SLIME_DESKTOP_PASS}"
      TZ: "${TZ:-UTC}"
    volumes:
      - desktop_home:/home
    networks:
      vpnnet:
        ipv4_address: 10.11.0.10   # fixed — use this in Windows App / FreeRDP
    # RDP port intentionally NOT published to host — only via WireGuard
    expose:
      - "3389"
    healthcheck:
      test: ["CMD-SHELL", "netstat -tlnp | grep :3389"]
      interval: 30s
      timeout: 5s
      retries: 3
    shm_size: "512m"     # shared memory for desktop apps

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  slimenet:
    name: slimeos-internal
    driver: bridge
  vpnnet:
    name: slimeos-vpn
    driver: bridge
    ipam:
      config:
        - subnet: 10.11.0.0/24

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  caddy_data:
  caddy_config:
  authelia_config:
  redis_data:
  postgres_data:
  wireguard_config:
  desktop_home:
