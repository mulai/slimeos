---
# Slime OS — Authelia Zero-Trust Configuration
# Docs: https://www.authelia.com/configuration/
# Secrets are injected via AUTHELIA_* environment variables in docker-compose.yml.
# No Go templates used — Authelia auto-maps AUTHELIA_<CONFIG_PATH> env vars.

theme: dark

server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: warn
  format: json

# ── TOTP (authenticator app MFA) ─────────────────────────────────────────────
totp:
  issuer: slimeos.com
  period: 30
  skew: 1
  secret_size: 32

# ── Identity validation ───────────────────────────────────────────────────────
# Secret injected via AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET
identity_validation:
  reset_password: {}

# ── Authentication backend ───────────────────────────────────────────────────
# File-based for v0.1. Replace with LDAP when scaling.
authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 3
      parallelism: 4
      memory: 65536
      key_length: 32
      salt_length: 16
  password_reset:
    disable: false

# ── Access control ────────────────────────────────────────────────────────────
access_control:
  default_policy: deny

  rules:
    - domain: auth.slimeos.com
      policy: bypass

    - domain: dashboard.slimeos.com
      policy: two_factor

    - domain: "*.slimeos.com"
      policy: one_factor

# ── Session ───────────────────────────────────────────────────────────────────
# Secret injected via AUTHELIA_SESSION_SECRET
session:
  name: slimeos_session
  same_site: lax
  inactivity: 12h
  expiration: 24h
  remember_me: 30d

  cookies:
    - domain: slimeos.com
      authelia_url: https://auth.slimeos.com
      default_redirection_url: https://dashboard.slimeos.com

  redis:
    host: redis
    port: 6379
    # Password injected via AUTHELIA_SESSION_REDIS_PASSWORD

# ── Storage ───────────────────────────────────────────────────────────────────
# Secrets injected via AUTHELIA_STORAGE_ENCRYPTION_KEY and AUTHELIA_STORAGE_POSTGRES_PASSWORD
storage:
  postgres:
    address: postgres:5432
    database: authelia
    username: authelia

# ── Notifications (MFA email delivery) ───────────────────────────────────────
# Credentials injected via AUTHELIA_NOTIFIER_SMTP_USERNAME and AUTHELIA_NOTIFIER_SMTP_PASSWORD
notifier:
  smtp:
    address: "submissions://smtp.larksuite.com:465"
    sender: "Slime OS <noreply@slimeos.com>"
    subject: "[Slime OS] {title}"
    startup_check_address: admin@slimeos.com
