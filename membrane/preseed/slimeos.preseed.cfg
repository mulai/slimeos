# Slime OS — Debian Preseed Configuration
# Generic x86_64. Works on any BIOS or UEFI machine.
# Hardware-specific tuning is applied by hardware-profiles/detect.sh post-install.
#
# Usage:
#   Boot Debian netinstall USB → Advanced → Automated install
#   At the boot: prompt add:
#     auto=true url=https://raw.githubusercontent.com/mulai/slimeos/main/membrane/preseed/slimeos.preseed.cfg
#
# Validated devices (see membrane/hardware-profiles/):
#   001 — Gigabyte H97-Gaming 3 / Intel i7-4790 (reference device)
#   006 — Apple MacBook / MacBook Pro / MacBook Air (Intel, 2012–2020)

# ── Locale & keyboard ────────────────────────────────────────────────────────
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# ── Network ──────────────────────────────────────────────────────────────────
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string slimeos
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string

# ── Mirror ───────────────────────────────────────────────────────────────────
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string bookworm

# ── Clock & timezone ─────────────────────────────────────────────────────────
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# ── Partitioning — full disk wipe, no swap, minimal ext4 root ───────────────
# WARNING: This DESTROYS all data on the target disk.
# The Windows license must be extracted first (see membrane/installer/extract-windows-license.ps1)
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/disk string /dev/sda
d-i partman/default_filesystem string ext4
# Our expert_recipe below deliberately has no swap partition (cloud handles
# memory pressure) — without this, partman raises an unpreseeded "no swap
# space selected, return to partitioning menu?" confirmation and the
# unattended install hangs forever waiting for input.
d-i partman-basicfilesystems/no_swap boolean false
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Custom recipe: 512 MB EFI (FAT32) + remainder as ext4 root (no swap — cloud handles memory)
d-i partman-auto/expert_recipe string \
  slimeos-layout :: \
    512 512 512 fat32 \
      $primary{ } $bootable{ } \
      method{ efi } format{ } \
    . \
    1024 10000 -1 ext4 \
      $primary{ } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ ext4 } \
      mountpoint{ / } \
    .

# ── User accounts ─────────────────────────────────────────────────────────────
# Root is disabled. A single locked local account for emergency recovery only.
d-i passwd/root-login boolean false
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Slime OS
d-i passwd/username string slime
# Password is overwritten by install.sh with a random recovery PIN
d-i passwd/user-password password slimeos-temp-change-me
d-i passwd/user-password-again password slimeos-temp-change-me
d-i passwd/user-default-groups string audio video netdev sudo

# ── Base system ───────────────────────────────────────────────────────────────
d-i base-installer/install-recommends boolean false
d-i base-installer/kernel/image string linux-image-amd64

# ── APT ───────────────────────────────────────────────────────────────────────
d-i apt-setup/use_mirror boolean true
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean false
d-i apt-setup/contrib boolean false
popularity-contest popularity-contest/participate boolean false

# ── Package selection — absolutely minimal ────────────────────────────────────
# efibootmgr is only a Recommends of grub-efi-amd64, not a hard dependency.
# With install-recommends disabled above, it never gets pulled in, and
# grub-efi-amd64's postinst (which calls grub-install to register the UEFI
# NVRAM boot entry) fails hard when efibootmgr is missing -- the install
# hangs at an unanswered "GRUB installation failed" dialog. Must be present
# before the grub-installer step runs (pkgsel runs first).
#
# grub-efi-amd64 itself is *also* listed here deliberately, in addition to
# letting the separate grub-installer step install it: installing it via
# pkgsel's plain apt-get succeeds reliably, but grub-installer's own later
# apt-install of the same package (with its own chroot/mount setup for the
# ESP) failed every time in testing with the same "GRUB installation
# failed" dialog. Pre-installing it here sidesteps whatever that
# environment difference is -- by the time grub-installer's own step
# runs, the package is already configured and it's a no-op.
tasksel tasksel/first multiselect
d-i pkgsel/include string \
  curl \
  wget \
  git \
  sudo \
  openssh-client \
  ca-certificates \
  gnupg \
  ufw \
  apparmor \
  wireguard \
  wireguard-tools \
  freerdp2-x11 \
  cage \
  weston \
  wayland-utils \
  policykit-1 \
  dbus \
  dbus-user-session \
  systemd-resolved \
  network-manager \
  network-manager-gnome \
  firmware-linux-free \
  firmware-brcm80211 \
  intel-microcode \
  amd64-microcode \
  efibootmgr \
  grub-efi-amd64

d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select unattended-upgrades

# ── GRUB ─────────────────────────────────────────────────────────────────────
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default
# Also write the fallback /EFI/BOOT/BOOTX64.EFI path, not just an NVRAM boot
# entry via efibootmgr. Some UEFI firmware (VM firmware and older/quirky
# real-hardware implementations alike) doesn't reliably support runtime
# NVRAM variable writes, which otherwise makes the whole GRUB install fail.
d-i grub-installer/force-efi-extra-removable boolean true
# Kernel params: quiet boot, no splash (custom plymouth later), apparmor on
d-i debian-installer/add-kernel-opts string quiet apparmor=1 security=apparmor

# ── Post-install ─────────────────────────────────────────────────────────────
# Downloads and runs the Slime OS installer to set up cage, FreeRDP, WireGuard client
#
# /target/etc/resolv.conf is a symlink to systemd-resolved's runtime stub
# (/run/systemd/resolve/stub-resolv.conf), which doesn't exist inside the
# static, not-yet-booted target filesystem -- so DNS resolution inside any
# `in-target` command silently fails (curl just can't resolve
# raw.githubusercontent.com, install.sh never gets downloaded, and running
# the empty/missing file then fails with exit 127). Plain `cp` onto a
# symlink follows it and writes through to the (nonexistent) target, so it
# silently no-ops -- the symlink must be removed first, then replaced with
# a real file holding the live installer environment's own working
# resolv.conf (which has real nameservers from DHCP).
d-i preseed/late_command string \
  rm -f /target/etc/resolv.conf; \
  cp /etc/resolv.conf /target/etc/resolv.conf; \
  in-target mkdir -p /opt/slimeos; \
  in-target curl -fsSL https://raw.githubusercontent.com/mulai/slimeos/main/membrane/installer/install.sh \
    -o /opt/slimeos/install.sh; \
  in-target chmod +x /opt/slimeos/install.sh; \
  in-target /opt/slimeos/install.sh --preseed-mode

# ── Finish ────────────────────────────────────────────────────────────────────
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean true
