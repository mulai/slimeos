<!--
=================================================================================
 SLIME OS LOCK SCREEN — KIOSK BUNDLE
 Self-contained static HTML/CSS/JS. No network requests, no build step, no
 external runtime. Open directly in a WPE WebKit / Chromium kiosk browser.

 ---------------------------------------------------------------------------
 INTEGRATION CONTRACT
 ---------------------------------------------------------------------------

 The backend drives the UI by calling:

   window.SlimeUI.setState(state, data)
     state: 'empty' | 'picker' | 'addBrain' | 'credentials' |
            'connecting' | 'error' | 'reconnecting' | 'disconnected' |
            'wifiList' | 'wifiPassword' | 'wifiConnecting' | 'wifiError' |
            'pairEntry' | 'pairConnecting' | 'pairError'
     data per state:
       picker:       { brains: [{ id, name, host, lastConnected }] }
       credentials:  { brainName, needUsername: bool }   // false => password-only
       connecting:   { brainName, stage }                // stage: free-text microcopy
       error:        { brainName, message, detail }      // detail = raw code (collapsed)
       reconnecting: { brainName, attempt }
       disconnected: {}   // client-only — driven by the WS bridge glue at the
                          // bottom of this file, never sent by the backend.
                          // Shown before the first WS connection succeeds and
                          // whenever it drops; no buttons (nothing could
                          // route an event anywhere while disconnected).
       wifiList:       { networks: [{ssid, signal, secured}], scanning: bool,
                         mode: 'boot'|'settings', connectionType: ''|'ethernet'|'wifi',
                         connectionSsid: string, skippable: bool }
                       // connectionType/connectionSsid describe what's ACTUALLY
                       // providing connectivity right now (queried live via
                       // nmcli device type, not just "is there some route") --
                       // connectionSsid is only meaningful when connectionType
                       // is 'wifi'.
                       // mode 'boot' = shown automatically, no working network
                       // yet (Skip button, no Back). mode 'settings' = opened
                       // deliberately from the picker's gear icon while a
                       // network already works (Back button, no Skip).
       wifiPassword:   { ssid, mode }
       wifiConnecting: { ssid, stage }
       wifiError:      { ssid, message, detail, mode, secured: bool }
                       // secured governs whether "Re-enter password" shows —
                       // meaningless for an open network.
       pairEntry:      { mode: 'boot'|'settings', skippable: bool }
                       // WireGuard self-pairing (see brain/enroll/): host +
                       // code entry. mode/skippable follow the same
                       // boot-vs-settings convention as wifiList.
       pairConnecting: { stage }
       pairError:      { message, detail, mode }
                       // No secured/re-enter-password concept here (one
                       // secret field, not two) — just Try again / Back.

     Examples:
       SlimeUI.setState('picker', { brains: [
         { id: 'b1', name: 'Home Office', host: '192.168.1.42', lastConnected: '2 hours ago' }
       ]});
       SlimeUI.setState('credentials', { brainName: 'Home Office', needUsername: true });
       SlimeUI.setState('connecting', { brainName: 'Home Office', stage: 'Waking up your Brain…' });
       SlimeUI.setState('error', { brainName: 'Home Office', message: "That password didn't work.", detail: 'ERR_AUTH_1002' });
       SlimeUI.setState('reconnecting', { brainName: 'Home Office', attempt: 2 });
       SlimeUI.setState('wifiList', { networks: [{ssid:'HomeNet', signal:80, secured:true}], scanning:false, mode:'boot', connectionType:'', connectionSsid:'', skippable:true });

   window.SlimeUI.setStatus({ clock, tunnel })
     clock:  'HH:MM' string. Once set, the strip advances it locally every 30s.
     tunnel: 'up' | 'down' | 'connecting'

     Example:
       SlimeUI.setStatus({ clock: '14:32', tunnel: 'up' });

 The page never calls a backend directly — it only fires DOM CustomEvents on
 `document`, payload in `event.detail`. The backend listens and responds with
 setState/setStatus calls:

   'slime:add-brain'       { name, host, port }         // port defaults to 3389
     document.addEventListener('slime:add-brain', e => { e.detail /* {name,host,port} */ });

   'slime:connect'         { id }
   'slime:remove-brain'    { id }                        // fired AFTER user confirms
   'slime:credentials'     { username?, password }       // username omitted if not needed
   'slime:retry'           {}
   'slime:reenter-password' {}
   'slime:back'            {}                            // back to picker, or cancel
   'slime:cancel-connect'  {}

   'slime:network-settings' {}                           // gear icon: open Wi-Fi settings
   'slime:wifi-connect'    { ssid }
   'slime:wifi-password'   { password }
   'slime:wifi-rescan'     {}
   'slime:wifi-skip'       {}                             // boot mode only

   'slime:power-shutdown'  {}                             // power icon, confirmed -- no response expected, the machine powers off
   'slime:power-restart'   {}                             // power icon, confirmed -- no response expected, the machine reboots

   'slime:pair-settings'   {}                             // pairing icon: open "Pair with a Brain"
   'slime:pair-submit'     { host, code }
   'slime:pair-skip'       {}                             // boot mode only

   Network setup reuses 'slime:retry' / 'slime:reenter-password' / 'slime:back'
   for the wifiError screen and 'slime:back' for backing out of wifiList in
   settings mode — same semantics (retry same target / re-supply secret / go
   back) as the Brain-connect flow, so no separate wifi-specific names exist
   for those three. Pairing reuses 'slime:retry' / 'slime:back' the same way
   (no re-enter-password equivalent — pairError has only one secret field).

 All form state (typed name/host/password, toggles) lives only in this page.
 The password is never stored or echoed anywhere except the single
 'slime:credentials' event payload at submit time.

 ---------------------------------------------------------------------------
 DEMO MODE
 ---------------------------------------------------------------------------
 Load with ?demo=1 to run a self-contained driver (bottom of this file) that
 seeds two Brains, logs every slime:* event to the console, and simulates a
 connect → connecting → error → retry → connecting → reconnecting flow so
 every screen is reachable by clicking through. Without ?demo=1 the page
 boots to 'disconnected' and opens a WebSocket to slimeos-bridge on
 ws://127.0.0.1:7770 (see the bridge glue script at the bottom of this file);
 the real backend takes over from there via SlimeUI calls.
=================================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slime OS</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk.woff2') format('woff2');
    font-weight: 400 700;
    font-display: swap;
  }
  @font-face {
    font-family: 'Plus Jakarta Sans';
    src: url('./fonts/plus-jakarta-sans.woff2') format('woff2');
    font-weight: 400 800;
    font-display: swap;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('./fonts/jetbrains-mono.woff2') format('woff2');
    font-weight: 400 600;
    font-display: swap;
  }

  :root{
    --shell:#05080b;
    --surface:#13191f;
    --elevated:#1C2530;
    --teal:#00C2A8;
    --teal-deep:#008B99;
    --mint:#5FE6D2;
    --text:#EAF1F7;
    --text-muted:#8B97A7;
    --text-dim:#56616f;
    --text-faint:#3f4954;
    --error:#ff8f8f;
    --font-display:'Space Grotesk', system-ui, sans-serif;
    --font-body:'Plus Jakarta Sans', system-ui, sans-serif;
    --font-mono:'JetBrains Mono', ui-monospace, monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:var(--shell);}
  body{
    font-family:var(--font-body);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  button, input{font-family:inherit;}
  input::placeholder{color:var(--text-dim);}
  ::selection{background:rgba(0,194,168,0.35);}

  @keyframes fadeUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes ambientDrift{0%,100%{background-position:0% 20%, 100% 80%}50%{background-position:8% 26%, 92% 74%}}
  @keyframes pulseRing{0%{transform:scale(0.85);opacity:0.55}70%{transform:scale(1.35);opacity:0}100%{opacity:0}}
  @keyframes blobFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  .app{
    position:relative;width:100%;height:100vh;
    background:
      radial-gradient(120% 90% at 15% 10%, rgba(0,194,168,0.10), transparent 55%),
      radial-gradient(110% 90% at 90% 90%, rgba(79,172,254,0.08), transparent 55%),
      var(--shell);
    background-size:180% 180%,180% 180%;
    animation:ambientDrift 26s ease-in-out infinite;
  }

  /* -------- status strip -------- */
  .status-strip{
    position:absolute;top:0;left:0;right:0;height:44px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 22px;font-family:var(--font-mono);font-size:11.5px;letter-spacing:0.5px;
    color:var(--text-muted);z-index:40;
  }
  .status-strip .brand{display:flex;align-items:center;gap:8px;color:var(--text-muted);}
  .status-strip .brand svg{width:16px;height:14px;opacity:0.85;}
  .status-strip .right{display:flex;align-items:center;gap:18px;}
  .tunnel-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
  .tunnel{display:flex;align-items:center;gap:6px;}
  .bars{display:flex;align-items:flex-end;gap:2px;height:11px;}
  .bars span{width:3px;background:var(--text-muted);border-radius:1px;}
  .settings-gear{display:flex;align-items:center;cursor:pointer;color:var(--text-muted);outline:none;}
  .settings-gear:hover{color:#C9D3DF;}
  .settings-gear:focus-visible{outline:2px solid var(--mint);outline-offset:3px;border-radius:4px;}

  /* -------- shared layout -------- */
  .screen{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:fadeUp .4s ease both;}
  .card{width:100%;max-width:400px;background:var(--surface);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:36px;}
  h1.title{margin:0;font-family:var(--font-display);font-weight:700;font-size:34px;letter-spacing:-0.6px;color:#F2F6FB;text-align:center;}
  h2.title{margin:0 0 6px;font-family:var(--font-display);font-weight:700;font-size:21px;color:#F2F6FB;}
  p.subtitle{margin:16px 0 0;max-width:420px;font-size:15.5px;line-height:1.65;color:var(--text-muted);text-align:center;}

  label.field-label{display:block;font-family:var(--font-mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mint);margin-bottom:8px;}
  input.field{width:100%;background:#0d1217;border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;font-size:14.5px;color:var(--text);outline:none;margin-bottom:18px;}
  input.field:focus-visible{border-color:var(--teal);outline:2px solid rgba(0,194,168,0.35);outline-offset:1px;}
  input.field.error{border-color:var(--error);}

  button{cursor:pointer;}
  button:focus-visible, [tabindex]:focus-visible, a:focus-visible{outline:2px solid var(--mint);outline-offset:3px;}

  .btn-primary{
    font-family:var(--font-display);font-weight:600;font-size:15px;color:#04221f;
    background:linear-gradient(150deg,#00F2FE,#00C2A8);border:none;border-radius:12px;
    padding:15px 30px;box-shadow:0 14px 30px -14px rgba(0,242,254,0.55);
  }
  .btn-primary:hover{filter:brightness(1.06);}
  .btn-secondary{
    background:none;border:1px solid rgba(255,255,255,0.14);border-radius:10px;
    padding:12px;font-family:var(--font-display);font-weight:600;font-size:14px;color:#C9D3DF;
  }
  .btn-secondary:hover{border-color:rgba(255,255,255,0.3);}
  .btn-ghost{
    font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;color:var(--text-dim);
    background:none;border:none;text-transform:uppercase;padding:8px;
  }
  .btn-ghost:hover{color:#7d8a9a;}

  /* -------- picker -------- */
  .picker-list{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;max-width:760px;width:100%;}
  .brain-card{
    position:relative;width:280px;background:var(--surface);border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;padding:20px;cursor:pointer;outline:none;transition:border-color .15s, transform .15s;
  }
  .brain-card:hover{border-color:rgba(0,194,168,0.4);transform:translateY(-2px);}
  .brain-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .brain-id{display:flex;align-items:center;gap:12px;min-width:0;}
  .brain-avatar{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:15px;color:#04221f;}
  .brain-name{font-family:var(--font-display);font-weight:600;font-size:15.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brain-host{font-family:var(--font-mono);font-size:11px;color:#7d8a9a;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brain-remove{background:none;border:none;color:var(--text-dim);font-size:16px;line-height:1;padding:4px 6px;border-radius:6px;}
  .brain-remove:hover{color:var(--error);background:rgba(255,107,107,0.08);}
  .brain-meta{margin-top:16px;display:flex;align-items:center;justify-content:space-between;}
  .brain-meta .last{font-size:11.5px;color:var(--text-faint);}
  .brain-meta .connect{font-family:var(--font-display);font-weight:600;font-size:12.5px;color:var(--mint);}
  .add-card{width:280px;background:transparent;border:1px dashed rgba(255,255,255,0.16);border-radius:16px;padding:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;min-height:96px;outline:none;color:var(--text-muted);}
  .add-card:hover{border-color:rgba(0,194,168,0.5);color:var(--mint);}

  /* -------- connecting -------- */
  .ring-wrap{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;}
  .ring{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(0,194,168,0.5);animation:pulseRing 2.2s ease-out infinite;}
  .ring.inner{inset:14px;animation-delay:.6s;}

  /* -------- error -------- */
  .error-card{width:100%;max-width:420px;background:var(--surface);border:1px solid rgba(255,111,111,0.18);border-radius:20px;padding:36px;text-align:center;}
  .error-icon{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;background:rgba(255,107,107,0.12);color:var(--error);font-size:24px;font-family:var(--font-display);font-weight:700;}
  .error-actions{display:flex;flex-direction:column;gap:10px;margin-top:28px;}
  .btn-tertiary{background:none;border:none;padding:10px;font-family:var(--font-display);font-weight:600;font-size:13.5px;color:var(--text-muted);}
  .btn-tertiary:hover{color:#C9D3DF;}
  details.tech{margin-top:24px;border-top:1px dashed rgba(255,255,255,0.08);padding-top:14px;text-align:left;}
  details.tech summary{cursor:pointer;color:var(--text-dim);font-family:var(--font-mono);font-size:10.5px;letter-spacing:1px;list-style:none;}
  details.tech summary::-webkit-details-marker{display:none;}
  details.tech summary:hover{color:#7d8a9a;}
  details.tech .code{margin-top:8px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);background:#0d1217;border-radius:8px;padding:10px 12px;}

  /* -------- reconnecting overlay -------- */
  .reconnect-panel{background:rgba(13,17,23,0.92);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:34px 40px;text-align:center;max-width:360px;}
  .spinner{display:inline-block;width:26px;height:26px;border:2px solid rgba(0,194,168,0.3);border-top-color:var(--teal);border-radius:50%;animation:spin .9s linear infinite;}

  /* -------- modal -------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(4,6,8,0.6);display:flex;align-items:center;justify-content:center;z-index:80;}
  .modal-card{width:100%;max-width:360px;background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;}

  .hidden{display:none !important;}

  @media (max-width:1400px){
    h1.title{font-size:30px;}
  }
</style>
</head>
<body>
<div class="app" id="app">

  <div class="status-strip" id="statusStrip">
    <div class="brand">
      <svg viewBox="0 0 120 104" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" fill="#ffffff" d="M60,8 C84.3,8 104,27.7 104,52 C104,76.3 84.3,96 60,96 C35.7,96 16,76.3 16,52 C16,27.7 35.7,8 60,8 Z M60,30 C72.15,30 82,39.85 82,52 C82,64.15 72.15,74 60,74 C47.85,74 38,64.15 38,52 C38,39.85 47.85,30 60,30 Z"></path></svg>
      <span>Slime OS</span>
    </div>
    <div class="right">
      <span class="tunnel" id="tunnelIndicator"><span class="tunnel-dot" id="tunnelDot"></span><span id="tunnelLabel">Not connected</span></span>
      <span class="settings-gear" id="btnNetworkSettings" tabindex="0" role="button" title="Network settings"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 13a7.97 7.97 0 0 0 0-2l2.1-1.6-2-3.5-2.5 1a8.1 8.1 0 0 0-1.7-1L14.9 3h-4l-.4 2.9a8.1 8.1 0 0 0-1.7 1l-2.5-1-2 3.5L6.4 11a7.97 7.97 0 0 0 0 2l-2.1 1.6 2 3.5 2.5-1c.5.4 1.1.8 1.7 1l.4 2.9h4l.4-2.9c.6-.2 1.2-.6 1.7-1l2.5 1 2-3.5-2.1-1.6Z"></path></svg></span>
      <span class="settings-gear" id="btnPairSettings" tabindex="0" role="button" title="Pair with a Brain"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 12a3 3 0 1 0 6 0 3 3 0 0 0-6 0Z"></path><path d="M4 12h2"></path><path d="M18 12h2"></path></svg></span>
      <span class="settings-gear" id="btnPower" tabindex="0" role="button" title="Power options"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v8"></path><path d="M18.4 6.6a9 9 0 1 1-12.8 0"></path></svg></span>
      <span class="bars"><span style="height:4px;"></span><span style="height:7px;"></span><span style="height:11px;"></span></span>
      <span id="clockLabel">--:--</span>
    </div>
  </div>

  <div id="screenRoot"></div>

  <div id="modalRoot"></div>

</div>

<script>
(function(){
  'use strict';

  /* ===================== SVG assets (inlined, no network) ===================== */

  function slimeBlobSVG(size, colorMode, showDrip){
    var gradId = 'slimeBody_' + Math.random().toString(36).slice(2);
    var glossId = 'slimeGloss_' + Math.random().toString(36).slice(2);
    var fill = colorMode === 'white' ? '#FFFFFF' : colorMode === 'black' ? '#0D1117' : ('url(#' + gradId + ')');
    var drip = showDrip ? '<path d="M60,90 C57,97 53,103 53,107 A7,7 0 1,0 67,107 C67,103 63,97 60,90 Z" fill="' + fill + '"></path>' : '';
    var gloss = colorMode === 'color' ? (
      '<ellipse cx="45" cy="33" rx="13" ry="7.5" transform="rotate(-38 45 33)" fill="url(#' + glossId + ')"></ellipse>' +
      '<circle cx="87" cy="38" r="2.8" fill="#ffffff" fill-opacity="0.5"></circle>'
    ) : '';
    var viewBox = showDrip ? '0 0 120 122' : '0 0 120 104';
    return (
      '<svg viewBox="' + viewBox + '" width="' + size + '" height="' + (size * (showDrip ? 122/120 : 104/120)) + '" style="display:block">' +
        '<defs>' +
          '<linearGradient id="' + gradId + '" x1="0" y1="0" x2="0.25" y2="1">' +
            '<stop offset="0" stop-color="#00F2FE"></stop>' +
            '<stop offset="0.16" stop-color="#1FD6C6"></stop>' +
            '<stop offset="0.5" stop-color="#00C2A8"></stop>' +
            '<stop offset="1" stop-color="#008B99"></stop>' +
          '</linearGradient>' +
          '<radialGradient id="' + glossId + '" cx="0.34" cy="0.26" r="0.55">' +
            '<stop offset="0" stop-color="#ffffff" stop-opacity="0.9"></stop>' +
            '<stop offset="0.6" stop-color="#ffffff" stop-opacity="0.12"></stop>' +
            '<stop offset="1" stop-color="#ffffff" stop-opacity="0"></stop>' +
          '</radialGradient>' +
        '</defs>' +
        drip +
        '<path fill-rule="evenodd" fill="' + fill + '" d="M60,8 C84.3,8 104,27.7 104,52 C104,76.3 84.3,96 60,96 C35.7,96 16,76.3 16,52 C16,27.7 35.7,8 60,8 Z M60,30 C72.15,30 82,39.85 82,52 C82,64.15 72.15,74 60,74 C47.85,74 38,64.15 38,52 C38,39.85 47.85,30 60,30 Z"></path>' +
        gloss +
      '</svg>'
    );
  }

  var ACCENTS = ['#00C2A8', '#4FACFE', '#00FF87'];
  var STAGE_FALLBACK = 'Waking up your Brain\u2026';
  var HOST_RE = /^(?:(?:\d{1,3}\.){3}\d{1,3}|[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*)$/;

  /* ===================== state ===================== */

  var current = { state: 'empty', data: {} };
  var pendingRemoveId = null;
  var clockDate = null;
  var clockTimer = null;

  var screenRoot = document.getElementById('screenRoot');
  var modalRoot = document.getElementById('modalRoot');

  function emit(name, detail){
    document.dispatchEvent(new CustomEvent(name, { detail: detail || {} }));
  }

  function escapeHtml(str){
    return String(str == null ? '' : str).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  /* ===================== mousedown -> click activation workaround =====================
     Real-hardware finding (2026-07-12, Gigabyte GA-78LMT-S2P, cage 0.2.0 +
     cog + WPE on trixie): mouse clicks on buttons/cards/icons never
     register at all, while native input-focus-on-click and keyboard Enter
     both work fine. Matches a known category of Wayland click-completion
     bugs (compositors must pair pointer-button events with a "frame"
     completion signal for a browser's `click` to fire -- see
     cage-kiosk/cage#305 and related wlroots seat/frame issues; cage 0.2.0
     is a much newer version than this repo's other comments were written
     against, so the exact bug surface has shifted). Patching cage/cog/
     wlroots upstream isn't practical here, so the page compensates itself:
     synthesize a `click` from `mousedown` after a short grace window, but
     only if a real `click` didn't already arrive -- so exactly one click
     fires whether or not the platform's own synthesis works. Verified
     this doesn't double-fire in a normal browser (demo mode); needs
     real-hardware confirmation that it actually fixes the reported bug.
  */
  var pendingClickEl = null;
  document.addEventListener('mousedown', function(e){
    var el = e.target.closest('button, [tabindex]');
    if (!el) return;
    pendingClickEl = el;
    setTimeout(function(){
      if (pendingClickEl === el){
        pendingClickEl = null;
        el.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
      }
    }, 200);
  }, true);
  document.addEventListener('click', function(){ pendingClickEl = null; }, true);

  /* ===================== status strip ===================== */

  function setStatus(opts){
    opts = opts || {};
    if (opts.clock){
      var parts = opts.clock.split(':');
      var d = new Date();
      d.setHours(parseInt(parts[0], 10) || 0, parseInt(parts[1], 10) || 0, 0, 0);
      clockDate = d;
      renderClock();
      if (!clockTimer){
        clockTimer = setInterval(function(){
          if (!clockDate) return;
          clockDate = new Date(clockDate.getTime() + 30000);
          renderClock();
        }, 30000);
      }
    }
    if (opts.tunnel){
      renderTunnel(opts.tunnel);
    }
  }

  function renderClock(){
    if (!clockDate) return;
    var pad = function(n){ return String(n).padStart(2, '0'); };
    document.getElementById('clockLabel').textContent = pad(clockDate.getHours()) + ':' + pad(clockDate.getMinutes());
  }

  var lastTunnel = 'down';
  function renderTunnel(tunnel){
    lastTunnel = tunnel;
    var dot = document.getElementById('tunnelDot');
    var label = document.getElementById('tunnelLabel');
    var color = tunnel === 'up' ? '#00FF87' : tunnel === 'connecting' ? '#5FE6D2' : '#56616f';
    var text = tunnel === 'up' ? 'Secure tunnel' : tunnel === 'connecting' ? 'Connecting\u2026' : 'Not connected';
    dot.style.background = color;
    dot.style.boxShadow = '0 0 6px ' + color;
    label.style.color = color;
    label.textContent = text;
  }

  /* ===================== rendering ===================== */

  function render(){
    var state = current.state, data = current.data || {};
    var html = '';
    if (state === 'empty') html = renderEmpty();
    else if (state === 'picker') html = renderPicker(data);
    else if (state === 'addBrain') html = renderAddBrain();
    else if (state === 'credentials') html = renderCredentials(data);
    else if (state === 'connecting') html = renderConnecting(data);
    else if (state === 'error') html = renderError(data);
    else if (state === 'reconnecting') html = renderReconnecting(data);
    else if (state === 'disconnected') html = renderDisconnected();
    else if (state === 'wifiList') html = renderWifiList(data);
    else if (state === 'wifiPassword') html = renderWifiPassword(data);
    else if (state === 'wifiConnecting') html = renderWifiConnecting(data);
    else if (state === 'wifiError') html = renderWifiError(data);
    else if (state === 'pairEntry') html = renderPairEntry(data);
    else if (state === 'pairConnecting') html = renderPairConnecting(data);
    else if (state === 'pairError') html = renderPairError(data);
    screenRoot.innerHTML = html;
    bindScreen(state, data);
    autofocus(state);
  }

  /* ===================== event binding ===================== */

  function bindScreen(state, data){
    if (state === 'empty'){
      document.getElementById('btnAddBrain').onclick = showLocalAddBrain;
      document.getElementById('btnSlimeId').onclick = showComingSoon;
    }
    else if (state === 'picker'){
      var list = document.getElementById('pickerList');
      list.addEventListener('keydown', function(e){
        if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
        var focusable = Array.prototype.slice.call(list.querySelectorAll('[tabindex]'));
        var idx = focusable.indexOf(document.activeElement);
        if (idx === -1) return;
        e.preventDefault();
        var next = e.key === 'ArrowDown' ? Math.min(idx + 1, focusable.length - 1) : Math.max(idx - 1, 0);
        focusable[next].focus();
      });
      list.querySelectorAll('.brain-card').forEach(function(card){
        var id = card.getAttribute('data-brain-id');
        card.addEventListener('click', function(){ emit('slime:connect', { id: id }); });
        card.addEventListener('keydown', function(e){ if (e.key === 'Enter') emit('slime:connect', { id: id }); });
      });
      list.querySelectorAll('.brain-remove').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          pendingRemoveId = btn.getAttribute('data-remove-id');
          var brains = (current.data && current.data.brains) || [];
          var b = brains.filter(function(x){ return String(x.id) === String(pendingRemoveId); })[0];
          showRemoveConfirm(b);
        });
      });
      document.getElementById('btnAddBrainCard').addEventListener('click', showLocalAddBrain);
      document.getElementById('btnAddBrainCard').addEventListener('keydown', function(e){ if (e.key === 'Enter') showLocalAddBrain(); });
      document.getElementById('btnSlimeId2').onclick = showComingSoon;
    }
    else if (state === 'addBrain'){
      var form = document.getElementById('addBrainForm');
      var advBtn = document.getElementById('btnAdvanced');
      var advPanel = document.getElementById('advancedPanel');
      advBtn.addEventListener('click', function(){
        var open = !advPanel.classList.contains('hidden');
        advPanel.classList.toggle('hidden');
        advBtn.textContent = open ? '+ Advanced (port)' : '\u2212 Hide advanced';
      });
      document.getElementById('btnCancelAdd').addEventListener('click', function(){ emit('slime:back'); });
      form.addEventListener('submit', function(e){
        e.preventDefault();
        var name = document.getElementById('fieldName').value.trim();
        var host = document.getElementById('fieldHost').value.trim();
        var hostInput = document.getElementById('fieldHost');
        var errBox = document.getElementById('hostError');
        if (!host || !HOST_RE.test(host)){
          hostInput.classList.add('error');
          errBox.textContent = 'Enter a valid IP address or hostname.';
          hostInput.focus();
          return;
        }
        hostInput.classList.remove('error');
        errBox.textContent = '';
        var port = document.getElementById('fieldPort').value.trim() || '3389';
        emit('slime:add-brain', { name: name || 'Untitled Brain', host: host, port: port });
      });
    }
    else if (state === 'credentials'){
      var cform = document.getElementById('credentialsForm');
      var toggleBtn = document.getElementById('btnTogglePw');
      var pwField = document.getElementById('fieldPassword');
      toggleBtn.addEventListener('click', function(){
        var showing = pwField.type === 'text';
        pwField.type = showing ? 'password' : 'text';
        toggleBtn.textContent = showing ? 'SHOW' : 'HIDE';
      });
      document.getElementById('btnBackFromCreds').addEventListener('click', function(){ emit('slime:back'); });
      cform.addEventListener('submit', function(e){
        e.preventDefault();
        var payload = { password: pwField.value };
        var uField = document.getElementById('fieldUsername');
        if (uField) payload.username = uField.value;
        emit('slime:credentials', payload);
      });
    }
    else if (state === 'connecting'){
      document.getElementById('btnCancelConnect').addEventListener('click', function(){ emit('slime:cancel-connect'); });
    }
    else if (state === 'error'){
      document.getElementById('btnTryAgain').addEventListener('click', function(){ emit('slime:retry'); });
      document.getElementById('btnReenterPassword').addEventListener('click', function(){ emit('slime:reenter-password'); });
      document.getElementById('btnBackFromError').addEventListener('click', function(){ emit('slime:back'); });
    }
    else if (state === 'reconnecting'){
      document.getElementById('btnBackFromReconnect').addEventListener('click', function(){ emit('slime:back'); });
    }
    else if (state === 'wifiList'){
      var wlist = document.getElementById('wifiListRoot');
      wlist.addEventListener('keydown', function(e){
        if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
        var focusable = Array.prototype.slice.call(wlist.querySelectorAll('[tabindex]'));
        var idx = focusable.indexOf(document.activeElement);
        if (idx === -1) return;
        e.preventDefault();
        var next = e.key === 'ArrowDown' ? Math.min(idx + 1, focusable.length - 1) : Math.max(idx - 1, 0);
        focusable[next].focus();
      });
      wlist.querySelectorAll('.wifi-item').forEach(function(item){
        var ssid = item.getAttribute('data-ssid');
        item.addEventListener('click', function(){ emit('slime:wifi-connect', { ssid: ssid }); });
        item.addEventListener('keydown', function(e){ if (e.key === 'Enter') emit('slime:wifi-connect', { ssid: ssid }); });
      });
      var rescanBtn = document.getElementById('btnWifiRescan');
      if (rescanBtn) rescanBtn.addEventListener('click', function(){ emit('slime:wifi-rescan'); });
      var skipBtn = document.getElementById('btnWifiSkip');
      if (skipBtn) skipBtn.addEventListener('click', function(){ emit('slime:wifi-skip'); });
      var wbackBtn = document.getElementById('btnWifiBack');
      if (wbackBtn) wbackBtn.addEventListener('click', function(){ emit('slime:back'); });
    }
    else if (state === 'wifiPassword'){
      var wform = document.getElementById('wifiPasswordForm');
      var wToggle = document.getElementById('btnToggleWifiPw');
      var wPwField = document.getElementById('fieldWifiPassword');
      wToggle.addEventListener('click', function(){
        var showing = wPwField.type === 'text';
        wPwField.type = showing ? 'password' : 'text';
        wToggle.textContent = showing ? 'SHOW' : 'HIDE';
      });
      document.getElementById('btnBackFromWifiPw').addEventListener('click', function(){ emit('slime:back'); });
      wform.addEventListener('submit', function(e){
        e.preventDefault();
        emit('slime:wifi-password', { password: wPwField.value });
      });
    }
    else if (state === 'wifiError'){
      document.getElementById('btnWifiTryAgain').addEventListener('click', function(){ emit('slime:retry'); });
      var wReenter = document.getElementById('btnWifiReenterPassword');
      if (wReenter) wReenter.addEventListener('click', function(){ emit('slime:reenter-password'); });
      document.getElementById('btnBackFromWifiError').addEventListener('click', function(){ emit('slime:back'); });
    }
    /* wifiConnecting has no interactive elements — nmcli connect is short and
       synchronous, unlike the long-lived xfreerdp session renderConnecting
       guards against, so no cancel affordance is needed. pairConnecting is
       the same shape, for the same reason. */
    else if (state === 'pairEntry'){
      var pform = document.getElementById('pairEntryForm');
      var pBackBtn = document.getElementById('btnBackFromPair');
      if (pBackBtn) pBackBtn.addEventListener('click', function(){ emit('slime:back'); });
      var pSkipBtn = document.getElementById('btnPairSkip');
      if (pSkipBtn) pSkipBtn.addEventListener('click', function(){ emit('slime:pair-skip'); });
      pform.addEventListener('submit', function(e){
        e.preventDefault();
        var hostInput = document.getElementById('fieldPairHost');
        var host = hostInput.value.trim();
        var errBox = document.getElementById('pairHostError');
        if (!host || !HOST_RE.test(host)){
          hostInput.classList.add('error');
          errBox.textContent = 'Enter a valid enrollment address.';
          hostInput.focus();
          return;
        }
        hostInput.classList.remove('error');
        var code = document.getElementById('fieldPairCode').value.trim();
        if (!code){
          errBox.textContent = 'Enter your pairing code.';
          return;
        }
        errBox.textContent = '';
        emit('slime:pair-submit', { host: host, code: code });
      });
    }
    else if (state === 'pairError'){
      document.getElementById('btnPairTryAgain').addEventListener('click', function(){ emit('slime:retry'); });
      document.getElementById('btnBackFromPairError').addEventListener('click', function(){ emit('slime:back'); });
    }
  }

  function autofocus(state){
    setTimeout(function(){
      var el = screenRoot.querySelector('[data-autofocus]');
      if (el && el.getAttribute('data-autofocus') !== '0') el.focus();
    }, 30);
  }

  /* local-only helpers (do not require a backend round-trip) */
  function showLocalAddBrain(){
    current = { state: 'addBrain', data: {} };
    render();
  }

  function showComingSoon(){
    var toast = document.createElement('div');
    toast.textContent = 'Slime ID is coming soon';
    toast.style.cssText = 'position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#1C2530;border:1px solid rgba(0,194,168,0.3);border-radius:999px;padding:10px 18px;font-family:var(--font-mono);font-size:11.5px;color:#5FE6D2;z-index:90;';
    document.body.appendChild(toast);
    setTimeout(function(){ toast.remove(); }, 1800);
  }

  function showRemoveConfirm(brain){
    modalRoot.innerHTML =
      '<div class="modal-overlay">' +
        '<div class="modal-card">' +
          '<h3 style="margin:0 0 10px;font-family:var(--font-display);font-weight:700;font-size:16.5px;color:#F2F6FB;">Remove ' + escapeHtml(brain ? brain.name : 'this Brain') + '?</h3>' +
          '<p style="margin:0;font-size:13px;line-height:1.6;color:var(--text-muted);">Its saved password will be deleted too. You\u2019ll need to sign in again next time.</p>' +
          '<div style="display:flex;gap:10px;margin-top:22px;">' +
            '<button class="btn-secondary" style="flex:1;" id="btnCancelRemove">Cancel</button>' +
            '<button style="flex:1;background:#3a1414;border:1px solid rgba(255,107,107,0.3);border-radius:10px;padding:11px;font-family:var(--font-display);font-weight:600;font-size:13.5px;color:#ff8f8f;" id="btnConfirmRemove">Remove</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.getElementById('btnCancelRemove').onclick = closeModal;
    document.getElementById('btnConfirmRemove').onclick = function(){
      emit('slime:remove-brain', { id: pendingRemoveId });
      closeModal();
    };
    modalRoot.querySelector('#btnCancelRemove').focus();
  }

  function closeModal(){ modalRoot.innerHTML = ''; pendingRemoveId = null; }

  function showPowerConfirm(){
    modalRoot.innerHTML =
      '<div class="modal-overlay">' +
        '<div class="modal-card">' +
          '<h3 style="margin:0 0 10px;font-family:var(--font-display);font-weight:700;font-size:16.5px;color:#F2F6FB;">Power options</h3>' +
          '<p style="margin:0;font-size:13px;line-height:1.6;color:var(--text-muted);">Any active session will be closed.</p>' +
          '<div style="display:flex;flex-direction:column;gap:10px;margin-top:22px;">' +
            '<button class="btn-secondary" id="btnConfirmRestart">Restart</button>' +
            '<button style="background:#3a1414;border:1px solid rgba(255,107,107,0.3);border-radius:10px;padding:11px;font-family:var(--font-display);font-weight:600;font-size:13.5px;color:#ff8f8f;" id="btnConfirmShutdown">Shut Down</button>' +
            '<button class="btn-tertiary" id="btnCancelPower">Cancel</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.getElementById('btnCancelPower').onclick = closeModal;
    document.getElementById('btnConfirmShutdown').onclick = function(){
      closeModal();
      showPowerOverlay('Shutting down…');
      emit('slime:power-shutdown');
    };
    document.getElementById('btnConfirmRestart').onclick = function(){
      closeModal();
      showPowerOverlay('Restarting…');
      emit('slime:power-restart');
    };
    modalRoot.querySelector('#btnCancelPower').focus();
  }

  // Client-only, non-interactive: once confirmed, the real machine is
  // about to power off/reboot regardless of anything the backend does
  // next, so there's nothing left to route an event to.
  function showPowerOverlay(text){
    screenRoot.innerHTML =
      '<div class="screen" data-screen="powerOverlay">' +
        '<div class="reconnect-panel">' +
          '<span class="spinner"></span>' +
          '<h2 style="margin:18px 0 0;font-family:var(--font-display);font-weight:600;font-size:17px;color:#F2F6FB;">' + escapeHtml(text) + '</h2>' +
        '</div>' +
      '</div>';
  }

  /* ===================== global keyboard (Esc = back/cancel) ===================== */

  document.addEventListener('keydown', function(e){
    if (e.key !== 'Escape') return;
    if (modalRoot.innerHTML.trim()){ closeModal(); return; }
    var s = current.state;
    if (s === 'connecting') emit('slime:cancel-connect');
    else if (s === 'addBrain' || s === 'credentials' || s === 'error' || s === 'reconnecting') emit('slime:back');
    else if (s === 'wifiPassword' || s === 'wifiError') emit('slime:back');
    else if (s === 'wifiList' && current.data && current.data.mode === 'settings') emit('slime:back');
    else if (s === 'pairError') emit('slime:back');
    else if (s === 'pairEntry' && current.data && current.data.mode === 'settings') emit('slime:back');
  });

  /* Gear icon lives in the always-present status strip, outside #screenRoot,
     so it's bound once here rather than per-render in bindScreen(). */
  var btnNetworkSettings = document.getElementById('btnNetworkSettings');
  btnNetworkSettings.addEventListener('click', function(){ emit('slime:network-settings'); });
  btnNetworkSettings.addEventListener('keydown', function(e){ if (e.key === 'Enter') emit('slime:network-settings'); });

  var btnPairSettings = document.getElementById('btnPairSettings');
  btnPairSettings.addEventListener('click', function(){ emit('slime:pair-settings'); });
  btnPairSettings.addEventListener('keydown', function(e){ if (e.key === 'Enter') emit('slime:pair-settings'); });

  var btnPower = document.getElementById('btnPower');
  btnPower.addEventListener('click', showPowerConfirm);
  btnPower.addEventListener('keydown', function(e){ if (e.key === 'Enter') showPowerConfirm(); });

  /* ===================== public API ===================== */

  window.SlimeUI = {
    setState: function(state, data){
      current = { state: state, data: data || {} };
      render();
    },
    setStatus: setStatus
  };

  var params = new URLSearchParams(window.location.search);
  var isDemo = params.get('demo') === '1';

  /* initial paint */
  if (isDemo){
    render();
  } else {
    // First frame ever painted, before any WS attempt -- see the bridge
    // glue at the bottom of this block.
    window.SlimeUI.setState('disconnected', {});
  }
  setStatus({ clock: '00:00', tunnel: 'down' });

  /* ===================== demo mode (?demo=1) ===================== */

  if (isDemo){
    ['slime:add-brain','slime:connect','slime:remove-brain','slime:credentials','slime:retry','slime:reenter-password','slime:back','slime:cancel-connect','slime:network-settings','slime:wifi-connect','slime:wifi-password','slime:wifi-rescan','slime:wifi-skip','slime:power-shutdown','slime:power-restart','slime:pair-settings','slime:pair-submit','slime:pair-skip'].forEach(function(name){
      document.addEventListener(name, function(e){ console.log('[demo]', name, e.detail); });
    });

    var demoBrains = [
      { id: 'b1', name: 'Home Office', host: '192.168.1.42', lastConnected: '2 hours ago' },
      { id: 'b2', name: 'Azure Windows', host: 'azure-win.internal', lastConnected: '3 days ago' }
    ];

    var demoNetworks = [
      { ssid: 'HomeNet-5G', signal: 82, secured: true },
      { ssid: 'CoffeeShop', signal: 46, secured: false },
      { ssid: 'Neighbor_2.4', signal: 30, secured: true }
    ];
    var demoWifiSsid = null; // non-null while inside a Wi-Fi sub-flow, so the
                              // shared retry/back/reenter-password listeners
                              // below know whether to route to the Wi-Fi flow
                              // or the Brain-connect flow.
    var demoWifiMode = 'settings';

    document.addEventListener('slime:network-settings', function(){
      demoWifiMode = 'settings';
      window.SlimeUI.setState('wifiList', { networks: demoNetworks, scanning: false, mode: 'settings', connectionType: 'ethernet', connectionSsid: '', skippable: false });
    });

    document.addEventListener('slime:wifi-rescan', function(){
      window.SlimeUI.setState('wifiList', { networks: demoNetworks, scanning: true, mode: demoWifiMode, connectionType: (demoWifiMode === 'settings' ? 'ethernet' : ''), connectionSsid: '', skippable: demoWifiMode === 'boot' });
      setTimeout(function(){
        window.SlimeUI.setState('wifiList', { networks: demoNetworks, scanning: false, mode: demoWifiMode, connectionType: (demoWifiMode === 'settings' ? 'ethernet' : ''), connectionSsid: '', skippable: demoWifiMode === 'boot' });
      }, 900);
    });

    document.addEventListener('slime:wifi-skip', function(){
      demoWifiSsid = null;
      setStatus({ tunnel: 'down' });
      window.SlimeUI.setState('picker', { brains: demoBrains });
    });

    document.addEventListener('slime:wifi-connect', function(e){
      var n = demoNetworks.filter(function(x){ return x.ssid === e.detail.ssid; })[0];
      if (!n) return;
      demoWifiSsid = n.ssid;
      if (n.secured){
        window.SlimeUI.setState('wifiPassword', { ssid: n.ssid, mode: demoWifiMode });
      } else {
        window.SlimeUI.setState('wifiConnecting', { ssid: n.ssid, stage: 'Connecting…' });
        setTimeout(function(){
          demoWifiSsid = null;
          setStatus({ tunnel: 'up' });
          window.SlimeUI.setState('picker', { brains: demoBrains });
        }, 1200);
      }
    });

    document.addEventListener('slime:wifi-password', function(){
      window.SlimeUI.setState('wifiConnecting', { ssid: demoWifiSsid, stage: 'Connecting…' });
      setTimeout(function(){
        window.SlimeUI.setState('wifiError', { ssid: demoWifiSsid, message: "That password didn't work.", detail: 'secrets were required', mode: demoWifiMode, secured: true });
      }, 1200);
    });

    document.addEventListener('slime:reenter-password', function(){
      if (demoWifiSsid) window.SlimeUI.setState('wifiPassword', { ssid: demoWifiSsid, mode: demoWifiMode });
    });

    document.addEventListener('slime:pair-settings', function(){
      window.SlimeUI.setState('pairEntry', { mode: 'settings', skippable: false });
    });

    document.addEventListener('slime:pair-submit', function(){
      var pmode = (current.data && current.data.mode) || 'settings';
      window.SlimeUI.setState('pairConnecting', { stage: 'Fetching your Brain’s configuration…' });
      setTimeout(function(){
        window.SlimeUI.setState('pairError', { message: 'That code is invalid or has expired.', detail: 'invalid_or_expired (HTTP 404)', mode: pmode });
      }, 1200);
    });

    document.addEventListener('slime:pair-skip', function(){
      window.SlimeUI.setState('picker', { brains: demoBrains });
    });

    setStatus({ clock: '14:32', tunnel: 'down' });
    window.SlimeUI.setState('picker', { brains: demoBrains });

    document.addEventListener('slime:connect', function(e){
      var b = demoBrains.filter(function(x){ return String(x.id) === String(e.detail.id); })[0];
      if (!b) return;
      setStatus({ tunnel: 'connecting' });
      window.SlimeUI.setState('connecting', { brainName: b.name, stage: 'Waking up your Brain\u2026' });
      setTimeout(function(){
        window.SlimeUI.setState('connecting', { brainName: b.name, stage: 'Securing the connection\u2026' });
      }, 900);
      setTimeout(function(){
        setStatus({ tunnel: 'down' });
        window.SlimeUI.setState('error', { brainName: b.name, message: "That password didn't work.", detail: 'ERR_AUTH_1002' });
      }, 2000);
    });

    document.addEventListener('slime:retry', function(){
      if (current.state === 'pairError'){
        window.SlimeUI.setState('pairConnecting', { stage: 'Fetching your Brain’s configuration…' });
        setTimeout(function(){
          setStatus({ tunnel: 'up' });
          window.SlimeUI.setState('picker', { brains: demoBrains });
        }, 1200);
        return;
      }
      if (demoWifiSsid){
        window.SlimeUI.setState('wifiConnecting', { ssid: demoWifiSsid, stage: 'Connecting\u2026' });
        setTimeout(function(){
          demoWifiSsid = null;
          setStatus({ tunnel: 'up' });
          window.SlimeUI.setState('picker', { brains: demoBrains });
        }, 1200);
        return;
      }
      setStatus({ tunnel: 'connecting' });
      window.SlimeUI.setState('connecting', { brainName: 'Home Office', stage: 'Waking up your Brain\u2026' });
      setTimeout(function(){
        setStatus({ tunnel: 'up' });
        window.SlimeUI.setState('reconnecting', { brainName: 'Home Office', attempt: 1 });
      }, 1600);
    });

    document.addEventListener('slime:back', function(){
      // Only reroute to wifiList when backing out of a *deeper* Wi-Fi
      // screen (password/error) -- backing out of wifiList itself must
      // fall through to the picker below, not re-render the same screen.
      if (demoWifiSsid !== null && (current.state === 'wifiPassword' || current.state === 'wifiError')){
        demoWifiSsid = null;
        window.SlimeUI.setState('wifiList', { networks: demoNetworks, scanning: false, mode: demoWifiMode, connectionType: (demoWifiMode === 'settings' ? 'ethernet' : ''), connectionSsid: '', skippable: demoWifiMode === 'boot' });
        return;
      }
      // Same shape for pairing: backing out of pairError returns to
      // pairEntry (not the picker); backing out of pairEntry itself falls
      // through to the picker below.
      if (current.state === 'pairError'){
        var pmode = current.data.mode || 'settings';
        window.SlimeUI.setState('pairEntry', { mode: pmode, skippable: pmode === 'boot' });
        return;
      }
      setStatus({ tunnel: 'down' });
      window.SlimeUI.setState('picker', { brains: demoBrains });
    });

    document.addEventListener('slime:add-brain', function(e){
      demoBrains.push({ id: 'b' + (demoBrains.length + 1), name: e.detail.name, host: e.detail.host, lastConnected: 'never' });
      window.SlimeUI.setState('picker', { brains: demoBrains });
    });

    document.addEventListener('slime:remove-brain', function(e){
      demoBrains = demoBrains.filter(function(x){ return String(x.id) !== String(e.detail.id); });
      window.SlimeUI.setState('picker', { brains: demoBrains });
    });
  } else {
    /* ===================== bridge glue (real backend) ===================== */
    // Talks to slimeos-bridge (membrane/bridge/) over a loopback WebSocket.
    // Port is hardcoded, not templated: this bundle's whole design point is
    // "static file, zero build step" -- keep this in sync with --listen in
    // the slimeos-bridge.service unit (membrane/installer/install.sh).
    var BRIDGE_PORT = 7770;
    var backoffMs = 500;
    var ws = null;

    var EVENT_TO_TYPE = {
      'slime:add-brain': 'addBrain',
      'slime:connect': 'connect',
      'slime:remove-brain': 'removeBrain',
      'slime:credentials': 'credentials',
      'slime:retry': 'retry',
      'slime:reenter-password': 'reenterPassword',
      'slime:back': 'back',
      'slime:cancel-connect': 'cancelConnect',
      'slime:network-settings': 'networkSettings',
      'slime:wifi-connect': 'wifiConnect',
      'slime:wifi-password': 'wifiPassword',
      'slime:wifi-rescan': 'wifiRescan',
      'slime:wifi-skip': 'wifiSkip',
      'slime:power-shutdown': 'powerShutdown',
      'slime:power-restart': 'powerRestart',
      'slime:pair-settings': 'pairSettings',
      'slime:pair-submit': 'pairSubmit',
      'slime:pair-skip': 'pairSkip'
    };

    function sendEvent(type, detail){
      // Guarded by readyState, not queued: while disconnected there's
      // nothing listening on the other end anyway, and the coordinator
      // always resyncs full state on the next successful connection.
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      var msg = { type: type };
      for (var k in detail){
        if (Object.prototype.hasOwnProperty.call(detail, k)) msg[k] = detail[k];
      }
      ws.send(JSON.stringify(msg));
    }

    Object.keys(EVENT_TO_TYPE).forEach(function(name){
      document.addEventListener(name, function(e){ sendEvent(EVENT_TO_TYPE[name], e.detail || {}); });
    });

    function connectBridge(){
      ws = new WebSocket('ws://127.0.0.1:' + BRIDGE_PORT + '/');
      ws.onopen = function(){ backoffMs = 500; };
      ws.onmessage = function(ev){
        var msg;
        try { msg = JSON.parse(ev.data); } catch (e) { return; }
        if (msg.type === 'setState') window.SlimeUI.setState(msg.state, msg.data);
        else if (msg.type === 'setStatus') window.SlimeUI.setStatus({ clock: msg.clock, tunnel: msg.tunnel });
      };
      ws.onclose = function(){
        window.SlimeUI.setState('disconnected', {});
        setTimeout(connectBridge, backoffMs);
        backoffMs = Math.min(backoffMs * 2, 5000);
      };
    }
    connectBridge();
  }
})();
</script>
</body>
</html>
